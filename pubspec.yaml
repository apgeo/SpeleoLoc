name: speleoloc
description: "An application that helps cavers to navigate underground and to document cave systems using QR codes"

publish_to: 'none'

version: 0.1.2+185
environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  mobile_scanner: ^7.1.4
  permission_handler: ^12.0.1
  image_picker: ^1.0.4
  sqflite: ^2.4.2
  path: ^1.9.1
  drift: ^2.30.1
  sqlite3_flutter_libs: ^0.5.41
  path_provider: ^2.1.5
  intl: ^0.20.2
  go_router: ^17.0.1
  file_picker: ^10.3.8
  image: ^4.0.17
  #qr: ^3.0.2
  pdf: ^3.11.0
  archive: ^3.4.0
  qr_flutter: ^4.0.0
  vector_math: ^2.1.2
  photo_view: ^0.14.0
  pdfx: any
  restart_app: ^1.3.2
  crypto: ^3.0.2
  csv: ^6.0.0
  pro_image_editor: ^7.0.5
  flutter_quill: ^11.4.0
  flutter_sound: ^9.17.8
  audio_waveforms: ^1.2.1
  package_info_plus: ^8.3.0
  tutorial_coach_mark: 1.3.3
  flutter_riverpod: ^2.6.1
  logging: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: ^2.30.1
  build_runner: ^2.10.5

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# Flutter packages specific section:
flutter:

  uses-material-design: true

  assets:
    - test_data/maps/
    - test_data/db/binaries/
    - assets/fonts/
    - assets/i18n/
