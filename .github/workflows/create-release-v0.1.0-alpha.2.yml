name: Create Release v0.1.0-alpha.2

on:
  push:
    branches:
      - copilot/release-v0-1-0-alpha-2

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if release already exists
        id: check_release
        run: |
          if gh release view v0.1.0-alpha.2 --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v0.1.0-alpha.2 already exists, skipping creation."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release v0.1.0-alpha.2 does not exist, will create."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release v0.1.0-alpha.2
        if: steps.check_release.outputs.exists == 'false'
        run: |
          gh release create v0.1.0-alpha.2 \
            --repo "${{ github.repository }}" \
            --title "SpeleoLoc v0.1.0-alpha.2" \
            --notes-file ".github/release-notes-v0.1.0-alpha.2.md" \
            --prerelease \
            --target main
          echo "Release v0.1.0-alpha.2 created successfully."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
